<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Expense Manager - Premium Dashboard</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Local Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1><i class="fa-solid fa-wallet"></i> Smart Expense Manager</h1>
      <button id="themeBtn" aria-label="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
    </header>

    <div class="date" id="today">
      <i class="fa-regular fa-calendar-days"></i> Loading date...
    </div>

    <!-- Main Dashboard Grid Layout -->
    <div class="dashboard-grid">
      
      <!-- Left Dashboard Column: Stats & Add Form -->
      <aside class="dashboard-left">
        <h2 class="section-title"><i class="fa-solid fa-chart-pie"></i> Overview & Budget</h2>
        
        <section class="cards">
          <!-- Total Expenses Card -->
          <div class="card card-expenses">
            <div class="card-icon"><i class="fa-solid fa-money-bill-transfer"></i></div>
            <div class="card-info">
              <h3>Total Expenses</h3>
              <p id="total">₹0</p>
            </div>
          </div>
          
          <!-- Entries Card -->
          <div class="card card-entries">
            <div class="card-icon"><i class="fa-solid fa-list-ol"></i></div>
            <div class="card-info">
              <h3>Entries</h3>
              <p id="count">0</p>
            </div>
          </div>
          
          <!-- Configurable Budget Card -->
          <div class="card card-budget" id="budgetCard" title="Click to edit budget limit">
            <div class="card-icon"><i class="fa-solid fa-piggy-bank"></i></div>
            <div class="card-info">
              <h3>Budget Left</h3>
              <p id="budgetLeft">₹20000</p>
            </div>
          </div>
        </section>

        <!-- Budget Progress Container -->
        <div class="progress-container">
          <div class="progress-header">
            <span>Budget Usage Limit</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <div id="progressBar"></div>
          </div>
          
          <!-- Budget Editing Form (Hidden by default) -->
          <div id="budgetEditGroup" class="budget-input-group" style="display: none;">
            <input type="number" id="budgetInput" placeholder="New Budget Limit" min="1">
            <button class="budget-save-btn" id="budgetSaveBtn">Save</button>
            <button class="budget-cancel-btn" id="budgetCancelBtn">Cancel</button>
          </div>
        </div>

        <!-- Add Transaction Form -->
        <section class="form-card">
          <h2 class="section-title" style="margin-bottom: 20px;"><i class="fa-solid fa-plus"></i> Add New Expense</h2>
          <div class="form-group">
            <input id="name" placeholder="Expense description (e.g. Groceries)">
            <input id="amount" type="number" placeholder="Amount (₹)">
            <select id="category" aria-label="Select Category">
              <option value="">Choose Category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Shopping">Shopping</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Bills">Bills</option>
              <option value="Other">Other</option>
            </select>
            <button id="addBtn"><i class="fa-solid fa-plus"></i> Add Expense</button>
          </div>
        </section>
      </aside>

      <!-- Right Dashboard Column: Actions, Visual Chart & List -->
      <main class="dashboard-right">
        <!-- Filter Toolbar -->
        <h2 class="section-title"><i class="fa-solid fa-sliders"></i> Filter & Actions</h2>
        <section class="toolbar">
          <input id="search" placeholder="🔍 Search expenses...">
          <select id="filter" aria-label="Filter by Category">
            <option value="All">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
          </select>
          <button id="exportBtn"><i class="fa-solid fa-file-export"></i> Export CSV</button>
        </section>

        <!-- Chart Visualization -->
        <h2 class="section-title"><i class="fa-solid fa-chart-column"></i> Expense Distribution</h2>
        <div class="chartWrap">
          <canvas id="chart"></canvas>
        </div>

        <!-- Table Transaction Records -->
        <h2 class="section-title"><i class="fa-solid fa-table-list"></i> Transaction History</h2>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Category</th>
                <th>Amount</th>
                <th style="text-align: center;">Actions</th>
              </tr>
            </thead>
            <tbody id="list"></tbody>
          </table>
          <div id="empty">
            <i class="fa-solid fa-folder-open"></i> No expenses added yet.
          </div>
        </div>
      </main>

    </div>

    <!-- Toast Notification Banner -->
    <div id="toast"></div>
  </div>

  <!-- Application Script -->
  <script src="script.js"></script>
</body>
</html>
